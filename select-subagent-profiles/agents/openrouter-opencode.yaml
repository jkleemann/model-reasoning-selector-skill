  policy:
    allowlist: []
    blocklist:
      - "openai/gpt-5.5"
      - "openai/gpt-5.5-pro"
      - "openai/gpt-5.4"
      - "openai/gpt-5.4-pro"
      - "anthropic/claude-opus-*"
    unavailable: []
    notes:
      - "OpenAI GPT and Claude frontier models are comparison anchors only in this cost-aware OpenRouter/OpenCode profile."
      - "Models without explicit reasoning controls may still be implementer candidates, but do not use them for critical final review unless no reasoning-enabled reviewer is available."
      - "For Java/Kotlin/database work, boost strength-matched models before applying generic difficulty fallback order."
      - "Use GLM 5.2 sparingly for Very High long-context or critical review tasks."
      - "Use Kimi K2.7 Code when Kimi/Moonshot behavior is explicitly preferred or agentic coding quality is worth the extra output cost."
