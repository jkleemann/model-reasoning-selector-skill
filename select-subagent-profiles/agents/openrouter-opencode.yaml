      display_name: "DeepSeek V4 Flash"
      provider: "DeepSeek"
      roles: ["implementer", "reviewer"]
      supports_reasoning: ["high", "xhigh"]
      default_reasoning: "high"
      tier: "low"
      cost_class: "ultra_low"
      speed_class: "fast"
      input_cost_per_mtok_usd: 0.09
      output_cost_per_mtok_usd: 0.18
      context_window: 1048576
      context_fit: "large_repo"
      supports_tools: true
      strengths: ["cheap_batch_work", "long_context", "debugging", "agentic_tool_use", "test_generation"]
      weak_spots: ["security_sensitive_review", "architecture_redesign"]
