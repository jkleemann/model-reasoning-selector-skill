interface:
  display_name: "Select Subagent Profiles"
  short_description: "Choose efficient OpenRouter/OpenCode subagent models"
  default_prompt: "Use $select-subagent-profiles with the OpenRouter/OpenCode profile to annotate or refresh a subagent-driven implementation plan."

harness_profile:
  id: "openrouter-opencode-cost-aware-coding"
  harnesses:
    - "opencode"
    - "openrouter"
    - "litellm-openrouter"
  catalog_size: "large"
  requires_policy: false
  dispatch_surface:
    task: "concrete OpenRouter model IDs only"
    model_id_format: "opencode dispatch IDs use openrouter/<provider>/<model>; OpenRouter API IDs in this file omit the leading openrouter/."
    dispatch_id_template: "openrouter/{id}"
    notes: "Do not choose arbitrary OpenRouter models outside this ranked catalog unless the caller supplies a policy-ranked override. When writing an OpenCode plan, render candidates through dispatch_id_template."
  model_source:
    retrieved_from: "OpenRouter /api/v1/models"
    retrieved_date: "2026-07-04"
    focus: "Coding, Java/Kotlin backend, database work, cost efficiency"
  reasoning_levels:
    - "none"
    - "low"
    - "medium"
    - "high"
    - "xhigh"
  selection_strategy:
    primary_order:
      - "required_capabilities"
      - "task_strength_match"
      - "domain_override"
      - "cost_class"
      - "speed_class"
      - "context_fit"
      - "reasoning_support"
      - "fallback_order"
    cost_bias: "Prefer the cheapest model expected to finish in the fewest total turns."
    speed_bias: "Prefer fast or balanced models for Low and Medium tasks; allow slower models only for High or Very High tasks needing long context or stronger reasoning."
    frontier_policy: "Avoid expensive frontier models by default; keep them only as external comparison anchors, not dispatch candidates."
  capability_tags:
    - "agentic_tool_use"
    - "cheap_batch_work"
    - "code_review"
    - "database_migrations"
    - "database_review"
    - "debugging"
    - "java_backend"
    - "kotlin_backend"
    - "long_context"
    - "repo_wide_refactor"
    - "spring_boot"
    - "sql_querying"
    - "test_generation"
